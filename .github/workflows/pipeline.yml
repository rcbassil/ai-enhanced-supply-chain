name: Supply Chain Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      forecast_input:
        description: 'Input CSV for demand forecasting'
        required: false
        default: 'data/retail_store_inventory.csv'
      inventory_input:
        description: 'Input CSV for inventory optimization (Scenario 1)'
        required: false
        default: 'data/inventory_s001_north_may_2022.csv'
      routing_inputs:
        description: 'Space-separated paths for routing optimization matrices'
        required: false
        default: 'data/distance_matrix_1.csv data/distance_matrix_2.csv'

jobs:
  demand-forecasting:
    name: Demand Forecasting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run demand-forecasting
        run: uv run demand-forecasting --input ${{ inputs.forecast_input || 'data/retail_store_inventory.csv' }}
        env:
          MPLBACKEND: Agg

      - name: Upload forecast output
        uses: actions/upload-artifact@v7
        with:
          name: forecast-output
          path: |
            data/retail_forecast_with_original_values.csv
            data/forecast_vs_actual.png
            data/feature_importance.png

  inventory-optimization:
    name: Inventory Optimization
    runs-on: ubuntu-latest
    needs: demand-forecasting
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Download forecast output
        uses: actions/download-artifact@v8
        with:
          name: forecast-output
          path: data/

      - name: Run inventory-optimization
        run: uv run inventory-optimization --input ${{ inputs.inventory_input || 'data/inventory_s001_north_may_2022.csv' }}

      - name: Upload inventory output
        uses: actions/upload-artifact@v7
        with:
          name: inventory-output
          path: |
            data/inventory_optimization_results_scenario_1.csv
            data/inventory_optimization_results_scenario_2.csv

  routing-optimization:
    name: Routing Optimization
    runs-on: ubuntu-latest
    needs: inventory-optimization
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run routing-optimization
        run: uv run routing-optimization --inputs ${{ inputs.routing_inputs || 'data/distance_matrix_1.csv data/distance_matrix_2.csv' }}

      - name: Upload routing output
        uses: actions/upload-artifact@v7
        with:
          name: routing-output
          path: data/routing_optimization_results.csv
